name: Daily Email Reminders

on:
  schedule:
    # Runs at 08:00 UTC every day
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send deadline reminders
        uses: actions/github-script@v7
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        with:
          script: |
            const SUPABASE_URL = process.env.SUPABASE_URL;
            const SERVICE_KEY  = process.env.SUPABASE_SERVICE_ROLE_KEY;
            const RESEND_KEY   = process.env.RESEND_API_KEY;
            const FROM_EMAIL   = process.env.FROM_EMAIL || 'Research Tracker <onboarding@resend.dev>';
            const APP_URL      = process.env.APP_URL || 'https://trex1102.github.io/research-tracker';

            const REMINDER_DAYS = [30, 15, 10, 5, 3, 1];
            const DEADLINE_FIELDS = [
              { key: 'abstract_deadline',     label: 'Abstract Deadline' },
              { key: 'full_paper_deadline',   label: 'Full Paper Deadline' },
              { key: 'notification_date',     label: 'Notification Date' },
              { key: 'camera_ready_deadline', label: 'Camera-Ready Deadline' },
              { key: 'conference_date',       label: 'Conference / Publication Date' },
            ];
            const STATUS_LABELS = {
              'idea':'Idea','topic-decided':'Topic Decided','literature-review':'Literature Review',
              'experiment-ongoing':'Experiment Ongoing','paper-writing':'Paper Writing',
              'submitted':'Submitted','under-review':'Under Review',
              'revision-requested':'Revision Requested','revision-submitted':'Revision Submitted',
              'accepted':'Accepted','camera-ready':'Camera Ready',
              'presented-published':'Presented / Published','rejected':'Rejected','dropped':'Dropped',
            };

            function daysBetween(d1, d2) {
              return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
            }

            function buildHtml({ entryName, deadlineLabel, deadlineDate, daysRemaining, status, entryId }) {
              const color = daysRemaining <= 3 ? '#dc2626' : daysRemaining <= 7 ? '#ea580c' :
                            daysRemaining <= 15 ? '#ca8a04' : '#16a34a';
              return `<!DOCTYPE html><html><body style="font-family:system-ui,sans-serif;background:#f9fafb;margin:0;padding:20px">
                <div style="max-width:520px;margin:0 auto;background:white;border-radius:16px;border:1px solid #e5e7eb;overflow:hidden">
                  <div style="background:#4f46e5;padding:24px 32px">
                    <h1 style="color:white;font-size:20px;font-weight:600;margin:0">📅 Research Tracker Reminder</h1>
                  </div>
                  <div style="padding:32px">
                    <div style="background:#fafafa;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:24px">
                      <h2 style="font-size:18px;font-weight:600;color:#111827;margin:0 0 8px">${entryName}</h2>
                      <p style="color:#6b7280;font-size:14px;margin:0">Status: <strong style="color:#374151">${STATUS_LABELS[status] || status}</strong></p>
                    </div>
                    <div style="background:${color}15;border:1px solid ${color}30;border-radius:12px;padding:20px;margin-bottom:24px;text-align:center">
                      <p style="font-size:14px;color:#374151;margin:0 0 8px">${deadlineLabel}</p>
                      <p style="font-size:32px;font-weight:700;color:${color};margin:0">${daysRemaining}</p>
                      <p style="font-size:14px;color:${color};margin:4px 0 8px">${daysRemaining === 1 ? 'day' : 'days'} remaining</p>
                      <p style="font-size:13px;color:#6b7280;margin:0">Due: ${deadlineDate}</p>
                    </div>
                    <a href="${APP_URL}/entries/${entryId}"
                       style="display:block;text-align:center;background:#4f46e5;color:white;text-decoration:none;padding:12px 24px;border-radius:8px;font-weight:600;font-size:14px">
                      View Entry →
                    </a>
                    <p style="font-size:12px;color:#9ca3af;text-align:center;margin-top:24px">
                      You're receiving this because you have a Research Tracker account.
                    </p>
                  </div>
                </div>
              </body></html>`;
            }

            async function sbFetch(path, opts = {}) {
              const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
                ...opts,
                headers: {
                  'apikey': SERVICE_KEY,
                  'Authorization': `Bearer ${SERVICE_KEY}`,
                  'Content-Type': 'application/json',
                  ...(opts.headers || {}),
                },
              });
              if (!res.ok) throw new Error(`Supabase ${path}: ${res.status} ${await res.text()}`);
              return res.json();
            }

            // Fetch active entries
            const entries = await sbFetch(
              '/entries?status=not.in.(rejected,dropped,presented-published)&select=*',
              { method: 'GET', headers: { 'Prefer': 'return=representation' } }
            );
            core.info(`Fetched ${entries.length} active entries`);

            // Fetch user emails
            const userIds = [...new Set(entries.map(e => e.user_id))];
            const emailMap = {};
            if (userIds.length > 0) {
              const ids = userIds.map(id => `"${id}"`).join(',');
              const profiles = await sbFetch(`/profiles?id=in.(${ids})&select=id,email`);
              for (const p of profiles) if (p.email) emailMap[p.id] = p.email;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let sent = 0, failed = 0, skipped = 0;

            for (const entry of entries) {
              const userEmail = emailMap[entry.user_id];
              if (!userEmail) { skipped++; continue; }

              const remindersSent = entry.reminders_sent || {};
              let updated = false;

              for (const { key, label } of DEADLINE_FIELDS) {
                if (!entry[key]) continue;
                const deadline = new Date(entry[key]);
                deadline.setHours(0, 0, 0, 0);
                const daysUntil = daysBetween(today, deadline);
                if (daysUntil < 0 || daysUntil > 30) continue;
                if (!REMINDER_DAYS.includes(daysUntil)) continue;
                if (remindersSent[key]?.[String(daysUntil)]) continue;

                const deadlineDateStr = deadline.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
                const html = buildHtml({
                  entryName: entry.name, deadlineLabel: label,
                  deadlineDate: deadlineDateStr, daysRemaining: daysUntil,
                  status: entry.status, entryId: entry.id,
                });
                const subject = `⏰ ${entry.name} — ${label} in ${daysUntil} day${daysUntil === 1 ? '' : 's'}`;

                const emailRes = await fetch('https://api.resend.com/emails', {
                  method: 'POST',
                  headers: { 'Authorization': `Bearer ${RESEND_KEY}`, 'Content-Type': 'application/json' },
                  body: JSON.stringify({ from: FROM_EMAIL, to: [userEmail], subject, html }),
                });

                if (emailRes.ok) {
                  core.info(`✅ Sent to ${userEmail}: ${entry.name} — ${label} (${daysUntil}d)`);
                  if (!remindersSent[key]) remindersSent[key] = {};
                  remindersSent[key][String(daysUntil)] = new Date().toISOString();
                  updated = true;
                  sent++;
                } else {
                  const err = await emailRes.text();
                  core.warning(`❌ Email failed for ${entry.name}: ${err}`);
                  failed++;
                }
              }

              if (updated) {
                await sbFetch(`/entries?id=eq.${entry.id}`, {
                  method: 'PATCH',
                  headers: { 'Prefer': 'return=minimal' },
                  body: JSON.stringify({ reminders_sent: remindersSent }),
                });
              }
            }

            core.info(`\n📊 Summary: ${sent} sent, ${failed} failed, ${skipped} skipped (no email)`);
            if (failed > 0) core.setFailed(`${failed} reminder(s) failed to send`);
