name: Daily Email Reminders

on:
  schedule:
    # Runs at 08:00 UTC every day
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (just log, do not send emails)'
        required: false
        default: 'false'

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-reminders edge function
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/send-reminders?secret=${{ secrets.CRON_SECRET }}")

          HTTP_BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $HTTP_BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Edge function returned non-200 status: $HTTP_CODE"
            exit 1
          fi

          # Parse and display results
          SENT=$(echo "$HTTP_BODY" | jq -r '.reminders_sent // 0')
          FAILED=$(echo "$HTTP_BODY" | jq -r '.reminders_failed // 0')
          CHECKED=$(echo "$HTTP_BODY" | jq -r '.checked // 0')

          echo "✅ Checked $CHECKED entries"
          echo "📧 Sent $SENT reminder(s)"
          if [ "$FAILED" -gt "0" ]; then
            echo "::warning::$FAILED reminder(s) failed to send"
          fi
